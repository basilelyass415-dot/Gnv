name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --user --upgrade buildozer Cython==0.29.33

      - name: Build with Buildozer
        run: |
          # هذا الأمر سيقوم بإنشاء ملف buildozer.spec إذا لم يكن موجوداً
          if [ ! -f buildozer.spec ]; then
            buildozer init
            # تعديل المتطلبات لتشمل tkinter و random
            sed -i 's/requirements = python3,kivy/requirements = python3,tkinter/' buildozer.spec
          fi
          # بدء عملية البناء (قد تستغرق 15-20 دقيقة)
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-tkinter-app
          path: bin/*.apk
